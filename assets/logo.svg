<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradient for the flame -->
    <linearGradient id="flameGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4500"/>
      <stop offset="50%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    
    <!-- Gradient for the inner flame -->
    <linearGradient id="innerFlameGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFEC8B"/>
    </linearGradient>
    
    <!-- Gradient for the arrow/speed lines -->
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#FF6B35" stroke-width="2"/>
  
  <!-- Speed lines (representing fast HTTP requests) -->
  <g filter="url(#glow)">
    <path d="M 25 85 L 55 85" stroke="url(#arrowGradient)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 20 100 L 60 100" stroke="url(#arrowGradient)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 25 115 L 55 115" stroke="url(#arrowGradient)" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Main flame shape -->
  <g filter="url(#glow)">
    <!-- Outer flame -->
    <path d="M 100 25
             C 115 45, 140 60, 145 90
             C 150 115, 145 140, 130 160
             C 120 175, 105 180, 100 180
             C 95 180, 80 175, 70 160
             C 55 140, 50 115, 55 90
             C 60 60, 85 45, 100 25
             Z" 
          fill="url(#flameGradient)"/>
    
    <!-- Inner flame -->
    <path d="M 100 55
             C 110 70, 125 80, 128 100
             C 132 120, 125 140, 115 155
             C 108 165, 102 168, 100 168
             C 98 168, 92 165, 85 155
             C 75 140, 68 120, 72 100
             C 75 80, 90 70, 100 55
             Z" 
          fill="url(#innerFlameGradient)"/>
    
    <!-- Bright core -->
    <ellipse cx="100" cy="130" rx="15" ry="25" fill="#FFFACD" opacity="0.8"/>
  </g>
  
  <!-- HTTP arrow piercing through (representing request/response) -->
  <g filter="url(#glow)">
    <path d="M 65 100 L 135 100" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M 125 90 L 140 100 L 125 110" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Small data packets -->
  <rect x="75" y="96" width="8" height="8" rx="1" fill="#FFFFFF" opacity="0.9"/>
  <rect x="90" y="96" width="8" height="8" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="105" y="96" width="8" height="8" rx="1" fill="#FFFFFF" opacity="0.5"/>
</svg>
